          headers: { 'X-N8N-API-KEY': NK, 'Content-Type': 'application/json' },

          log(`❌ Erro ${r.status}: ${JSON.stringify(d)}`, 'err');
        }
      } catch(e) {
        log(`❌ Falha: ${e.message}`, 'err');
      }
      document.getElementById('btn1').disabled = false;
    }
